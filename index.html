<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="">
    <meta name="description" content="">
    <!-- 파비콘 -->
    <link rel="shortcut icon" href="" type="image/x-icon">
    <!-- 디자인 -->
    <link rel="stylesheet" href="./styles/reset.css"><!-- ★reset 먼저 작성 -->
    <!-- <link rel="stylesheet" href="./styles/index.css"> -->
    <link rel="stylesheet" href="./styles/index.css">
    <title>To-Do-list</title>
    <!-- 웹글꼴 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
</head>
<body>
    <div id="wrap">
        <header>
            <!-- 1행(로고, 검색, 메뉴) -->
            <div class="top">
                <h1><a href="#">To Do</a></h1>
                <div class="r_menu">
                    <a href="#" class="search_btn"><img src="./images/search_btn.svg" alt="찾기"></a>
                    <a href="#" class="menu_btn"><img src="./images/all_menu_btn.svg" alt="메뉴"></a>
                </div>
            </div>
            <!-- 2행(전체, 오늘 보기메뉴) -->
            <nav class="all_today">
                <a href="#" class="all active">All<span class="a_number">(3)</span></a>
                <a href="#" class="today">Today<span class="t_number">(0)</span></a>
            </nav>
        </header>
        <main>
            <!-- 1. 날짜~할일 목록 리스트 -->
            <ul class="day_todo_list">
                <li>
                    <a href="#" class="date">05.12</a>
                    <a href="#" class="content">매일 책 15분 읽기 목표</a>
                </li>
                <li>
                    <a href="#" class="date">05.12</a>
                    <a href="#" class="content">매일 책 15분 읽기 목표</a>
                </li>
                <li>
                    <a href="#" class="date">05.30</a>
                    <a href="#" class="content">매일 책 15분 읽기 목표</a>
                </li>
                <li>
                    <a href="#" class="date">06.28</a>
                    <a href="#" class="content">매일 책 15분 읽기 목표</a>
                </li>
                <li>
                    <a href="#" class="date">06.29</a>
                    <a href="#" class="content">css flex 복습하기</a>
                </li>
            </ul>
            <!-- 2. 글쓰기 버튼 -->
            <a href="#" class="write_popup_btn"><img src="./images/write_popup_btn.svg" alt="글쓰기"></a>
            <!-- 3. 글쓰기버튼 클릭 시 실행화면 -->
            <div class="write_popup">
                <p class="info">add a new task</p>
                <a href="#" class="write_btn"><img src="./images/write_btn.svg" alt="글쓰기"></a>
            </div>
        </main>
    </div><!-- e:#wrap -->
</body>
</html>
